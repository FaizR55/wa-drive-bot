services:
  chromium:
    image: ghcr.io/browserless/chromium:latest
    environment:
      - TIMEOUT=0
      - CONCURRENT=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(3000,'localhost',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  wa-drive-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-drive-bot
    ports:
      - "${PORT}:${PORT}"
    env_file:
      - .env
    environment:
      - CHROMIUM_WS_ENDPOINT=ws://chromium:3000
    depends_on:
      chromium:
        condition: service_healthy
    volumes:
      # Mount credentials from a host file path
      - type: bind
        source: ${GOOGLE_CREDENTIALS:-./gcreds.json}
        target: /app/gcreds.json
        read_only: true
      # Mount .env file for configuration
      - type: bind
        source: ./.env
        target: /app/.env
        read_only: true
      # Mount initial database
      - type: bind
        source: ./database.db
        target: /app/database.db
      # Persistent data volumes
      - wa_bot_data:/data
      - wa_bot_uploads:/app/uploads
    restart: unless-stopped
    # Uncomment for development with file watching
    # command: npm run dev
    # volumes:
    #   - ./src:/app/src

volumes:
  wa_bot_data:
  wa_bot_uploads:
